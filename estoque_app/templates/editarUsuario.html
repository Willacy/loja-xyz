{% extends 'base.html' %}
{% block titulo%} Loja XYZ - Editar Usuario {% endblock %}

{% block conteudo %}
<form action="{% url 'editarUsuario' usuario.id %}" method="post" class="form">

    {% csrf_token %}
    <div class="row">
        <div class="col">{{form.username}}</div>
        <div class="col"><input class="col form-control my-2 p-2" placeholder="Senha" type="password" name="password"></div>
        <div class="col"><input class="col form-control my-2 p-2" placeholder="Repetir senha" type="password"
                name="confirmacao"></div>
    </div>

    <div class="row mb-3">
        <div class="col">{{form.first_name}}</div>
        <div class="col">{{form.last_name}}</div>
        <div class="col">{{form.email}}</div>
    </div>

    <div class="b-2 mb-3">
        PERMISSÕES
    </div>
        {% for permissao in permissoes %}
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="{{permissao.id}}" {% for p in permissoes_usuario %} {% if permissao.codename == p.codename %} checked {% endif %} {% endfor %} name="p_{{permissao.id}}" id="perm{{permissao.id}}" />

                <label for="perm{{permissao.id}}">
                    {{permissao.codename}}
                </label>
            </div>
        {% endfor %}

    
    <button type="submit">Salvar Alterações</button>


</form>
    <a href="{% url 'painel' %}" class="btn btn-success mt-3"> Painel</a>
{% endblock conteudo %}
